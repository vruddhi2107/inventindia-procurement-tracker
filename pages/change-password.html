<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ProcureOps — Password Reset</title>
<link rel="icon" type="image/x-icon" href="../ii favicon.png">

<link rel="stylesheet" href="../css/styles.css"/>
<style>
body { background: var(--off-white); }
.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.auth-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 36px 32px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}
.auth-logo {
  display: flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 28px;
}
/* .auth-logo-mark {
  width: 36px;
  height: 36px;
  background: var(--red);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
} */
.auth-logo-text { font-weight: 800; font-size: 1.1rem; color: #111; }
.auth-logo-text span { color: var(--red); }
.auth-title { font-size: 1.25rem; font-weight: 800; color: #111; margin-bottom: 6px; }
.auth-sub { font-size: 0.82rem; color: var(--gray-3); margin-bottom: 24px; line-height: 1.5; }
.step { display: none; }
.step.active { display: block; }
.step-indicator {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}
.step-dot {
  height: 4px;
  flex: 1;
  border-radius: 2px;
  background: var(--border);
  transition: background 0.25s;
}
.step-dot.active { background: var(--red); }
.step-dot.done { background: #22c55e; }
.error-box {
  display: none;
  padding: 10px 12px;
  background: rgba(214,43,43,0.08);
  border: 1px solid rgba(214,43,43,0.22);
  border-radius: 6px;
  color: var(--red);
  font-size: 0.8rem;
  margin-bottom: 14px;
}
.success-box {
  display: none;
  padding: 10px 12px;
  background: rgba(22,163,74,0.08);
  border: 1px solid rgba(22,163,74,0.22);
  border-radius: 6px;
  color: #16a34a;
  font-size: 0.8rem;
  margin-bottom: 14px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.78rem;
  color: var(--gray-3);
  text-decoration: none;
  margin-top: 18px;
}
.back-link:hover { color: var(--red); }
.mode-tabs {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 24px;
}
.mode-tab {
  flex: 1;
  padding: 9px;
  border: none;
  background: white;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--gray-3);
  transition: all 0.15s;
}
.mode-tab.active {
  background: var(--red);
  color: white;
  font-weight: 700;
}
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">
  <img src="https://nxhvxfvfhvbkymgvmwwi.supabase.co/storage/v1/object/public/assets/Inventindia_Logo-2.png" alt="Logo" width="50" height="20">
</div>
      <div class="auth-logo-text">Procure<span>X</span></div>
    </div>

    <!-- Mode Tabs -->
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" onclick="setMode('forgot')">🔑 Forgot Password</button>
      <button class="mode-tab" onclick="setMode('change')">🔄 Change Password</button>
    </div>

    <!-- ══════════════════════════════════
         MODE: FORGOT PASSWORD (2 steps)
         ══════════════════════════════════ -->
    <div id="forgotFlow">
      <!-- Step indicators -->
      <div class="step-indicator">
        <div class="step-dot active" id="fDot1"></div>
        <div class="step-dot" id="fDot2"></div>
      </div>

      <!-- Step 1: Enter Email -->
      <div class="step active" id="fStep1">
        <div class="auth-title">Forgot Password?</div>
        <div class="auth-sub">Enter your registered email address. We'll verify it and let you set a new password.</div>
        <div id="fErr1" class="error-box"></div>
        <div class="form-group" style="margin-bottom:16px">
          <label class="form-label">Email Address *</label>
          <input class="form-control" id="fEmail" type="email" placeholder="you@inventindia.com" onkeydown="if(event.key==='Enter')verifyEmail()"/>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="verifyEmail()">Continue →</button>
      </div>

      <!-- Step 2: Set New Password -->
      <div class="step" id="fStep2">
        <div class="auth-title">Set New Password</div>
        <div class="auth-sub" id="fStep2Sub">Enter your new password for <strong id="fEmailDisplay"></strong></div>
        <div id="fErr2" class="error-box"></div>
        <div id="fSuccess2" class="success-box"></div>
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">New Password *</label>
          <input class="form-control" id="fNewPw" type="password" placeholder="At least 6 characters" autocomplete="new-password"/>
        </div>
        <div class="form-group" style="margin-bottom:18px">
          <label class="form-label">Confirm New Password *</label>
          <input class="form-control" id="fConfirmPw" type="password" placeholder="Repeat new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')resetPassword()"/>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="resetPassword()">Reset Password</button>
        <button class="btn btn-ghost" style="width:100%;margin-top:8px" onclick="goToStep(1,'f')">← Back</button>
      </div>
    </div>

    <!-- ══════════════════════════════════
         MODE: CHANGE PASSWORD (logged in)
         ══════════════════════════════════ -->
    <div id="changeFlow" style="display:none">
      <div class="auth-title">Change Password</div>
      <div class="auth-sub">Update your account password. You'll need your current password to proceed.</div>
      <div id="cErr" class="error-box"></div>
      <div id="cSuccess" class="success-box"></div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Current Password *</label>
        <input class="form-control" id="cOldPw" type="password" placeholder="Your current password" autocomplete="current-password"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">New Password *</label>
        <input class="form-control" id="cNewPw" type="password" placeholder="At least 6 characters" autocomplete="new-password"/>
      </div>
      <div class="form-group" style="margin-bottom:18px">
        <label class="form-label">Confirm New Password *</label>
        <input class="form-control" id="cConfirmPw" type="password" placeholder="Repeat new password" autocomplete="new-password" onkeydown="if(event.key==='Enter')changePassword()"/>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="changePassword()">Update Password</button>
    </div>

    <a href="../index.html" class="back-link">← Back to Login</a>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../js/supabase-config.js"></script>
<script>
let verifiedUserId = null;

function showLoader(s){ const e=document.getElementById('loadingOverlay'); if(e)e.classList.toggle('active',s); }

function setMode(mode) {
  document.querySelectorAll('.mode-tab').forEach((t,i)=>t.classList.toggle('active',['forgot','change'][i]===mode));
  document.getElementById('forgotFlow').style.display = mode==='forgot' ? 'block' : 'none';
  document.getElementById('changeFlow').style.display = mode==='change' ? 'block' : 'none';
  // If switching to change, check if user is logged in
  if (mode==='change') {
    const user = Session.get();
    if (!user) {
      document.getElementById('cErr').textContent = 'You must be logged in to change your password. Use "Forgot Password" instead.';
      document.getElementById('cErr').style.display = 'block';
    }
  }
}

function goToStep(n, prefix) {
  // Update dots
  [1,2].forEach(i=>{
    const dot = document.getElementById(`${prefix}Dot${i}`);
    if(dot) {
      dot.classList.toggle('active', i===n);
      dot.classList.toggle('done', i<n);
    }
  });
  // Show correct step
  document.querySelectorAll(`#${prefix==='f'?'forgotFlow':'changeFlow'} .step`).forEach((s,i)=>{
    s.classList.toggle('active', i+1===n);
  });
}

// ── FORGOT PASSWORD ──────────────────────────────────────────
async function verifyEmail() {
  const email = document.getElementById('fEmail').value.trim();
  const errEl = document.getElementById('fErr1');
  errEl.style.display = 'none';

  if (!email) { errEl.textContent='Please enter your email address.'; errEl.style.display='block'; return; }

  showLoader(true);
  const { data, error } = await db.from('users').select('id,name,email').eq('email', email).maybeSingle();
  showLoader(false);

  if (error || !data) {
    errEl.textContent = 'No account found with that email address. Please check and try again.';
    errEl.style.display = 'block';
    return;
  }

  verifiedUserId = data.id;
  document.getElementById('fEmailDisplay').textContent = data.email;
  goToStep(2, 'f');
  setTimeout(()=>document.getElementById('fNewPw').focus(), 100);
}

async function resetPassword() {
  const newPw = document.getElementById('fNewPw').value;
  const confirmPw = document.getElementById('fConfirmPw').value;
  const errEl = document.getElementById('fErr2');
  const succEl = document.getElementById('fSuccess2');
  errEl.style.display = 'none';
  succEl.style.display = 'none';

  if (!newPw || !confirmPw) { errEl.textContent='Both fields are required.'; errEl.style.display='block'; return; }
  if (newPw.length < 6) { errEl.textContent='Password must be at least 6 characters.'; errEl.style.display='block'; return; }
  if (newPw !== confirmPw) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
  if (!verifiedUserId) { errEl.textContent='Session expired. Please start again.'; errEl.style.display='block'; return; }

  showLoader(true);
  const { error } = await db.from('users').update({ password: newPw }).eq('id', verifiedUserId);
  showLoader(false);

  if (error) { errEl.textContent='Update failed: '+error.message; errEl.style.display='block'; return; }

  succEl.textContent = ' Password reset successfully! Redirecting to login...';
  succEl.style.display = 'block';
  document.getElementById('fNewPw').value = '';
  document.getElementById('fConfirmPw').value = '';
  // Update step dots to done
  document.getElementById('fDot1').classList.add('done');
  document.getElementById('fDot2').classList.add('done');

  setTimeout(()=>{ window.location.href = '../index.html'; }, 2000);
}

// ── CHANGE PASSWORD (logged in) ──────────────────────────────
async function changePassword() {
  const oldPw = document.getElementById('cOldPw').value;
  const newPw = document.getElementById('cNewPw').value;
  const confirmPw = document.getElementById('cConfirmPw').value;
  const errEl = document.getElementById('cErr');
  const succEl = document.getElementById('cSuccess');
  errEl.style.display = 'none';
  succEl.style.display = 'none';

  if (!oldPw || !newPw || !confirmPw) { errEl.textContent='All fields are required.'; errEl.style.display='block'; return; }
  if (newPw.length < 6) { errEl.textContent='New password must be at least 6 characters.'; errEl.style.display='block'; return; }
  if (newPw !== confirmPw) { errEl.textContent='New passwords do not match.'; errEl.style.display='block'; return; }

  const user = Session.get();
  if (!user) { errEl.textContent='Not logged in. Please use "Forgot Password" instead.'; errEl.style.display='block'; return; }

  showLoader(true);
  const { data: userRec, error: fetchErr } = await db.from('users').select('id,password').eq('id', user.id).single();
  if (fetchErr || !userRec) { showLoader(false); errEl.textContent='Could not verify account.'; errEl.style.display='block'; return; }
  if (userRec.password !== oldPw) { showLoader(false); errEl.textContent='Current password is incorrect.'; errEl.style.display='block'; return; }

  const { error: updateErr } = await db.from('users').update({ password: newPw }).eq('id', user.id);
  showLoader(false);

  if (updateErr) { errEl.textContent='Update failed: '+updateErr.message; errEl.style.display='block'; return; }

  succEl.textContent = ' Password updated! You can now use your new password to log in.';
  succEl.style.display = 'block';
  document.getElementById('cOldPw').value = '';
  document.getElementById('cNewPw').value = '';
  document.getElementById('cConfirmPw').value = '';
}

// ── INIT ─────────────────────────────────────────────────────
// Auto-switch to change mode if user is logged in
document.addEventListener('DOMContentLoaded', () => {
  const user = Session.get();
  // Check URL param for mode
  const params = new URLSearchParams(window.location.search);
  const mode = params.get('mode');
  if (mode === 'change' || (user && !mode)) {
    setMode('change');
  }
});
</script>
</body>
</html>
