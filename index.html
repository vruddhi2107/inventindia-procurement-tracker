<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ProcureOps — Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        :root {
            --primary: #e60023;
            --primary-dark: #ad081b;
            --accent: #ff4d6d;
            --bg-dark: #0f1115;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #1a1a1b;
            --text-muted: #64748b;
            --radius-xl: 40px;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-page {
            display: flex;
            width: 95vw;
            max-width: 1400px;
            height: 90vh;
            background: #ffffff;
            border-radius: var(--radius-xl);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.8);
        }

        /* --- Left Side: Branding & Experience --- */
        .login-brand {
            flex: 1.4;
            background: var(--bg-dark);
            position: relative;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Abstract Modern Background */
        .brand-visuals {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
        }
        .circle-1 { width: 400px; height: 400px; background: var(--primary); opacity: 0.15; top: -100px; left: -100px; }
        .circle-2 { width: 300px; height: 300px; background: var(--accent); opacity: 0.1; bottom: -50px; right: -50px; }

        .login-brand-logo {
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }

        .logo-img {
            width: 48px;
            height: 48px;
            filter: drop-shadow(0 0 10px rgba(230, 0, 35, 0.3));
        }

        .brand-title {
            color: white;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .brand-title span { color: var(--primary); }

        .brand-headline {
            z-index: 10;
            color: white;
            font-size: clamp(40px, 5vw, 68px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -3px;
        }

        .brand-headline span {
            background: linear-gradient(to right, #e60023, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-footer {
            z-index: 10;
            display: flex;
            gap: 24px;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }

        /* --- Right Side: Form --- */
        .login-form-side {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: white;
        }

        .login-form-box {
            width: 100%;
            max-width: 400px;
        }

        .login-form-box h1 {
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 8px;
        }

        .login-form-sub {
            color: var(--text-muted);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: var(--transition);
        }

        .form-control {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
            background: #fcfcfd;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(230, 0, 35, 0.08);
        }

        .form-control:focus + i {
            color: var(--primary);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 25px -5px rgba(230, 0, 35, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(230, 0, 35, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Status States */
        .login-error {
            display: none;
            background: #fff1f2;
            color: #e11d48;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid #ffe4e6;
            align-items: center;
            gap: 10px;
        }

        .login-error.visible { display: flex; animation: slideIn 0.3s ease; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 1024px) {
            .login-brand { display: none; }
            .login-page { width: 100%; height: 100vh; border-radius: 0; max-width: none; }
            .login-form-box { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="login-page">
    <div class="login-brand">
        <div class="brand-visuals">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
        </div>

        <div class="login-brand-logo">
            <img src="ii favicon.png" alt="Logo" class="logo-img">
            <div class="brand-title">Procure<span>Ops</span></div>
        </div>

        <div class="login-brand-content">
            <h1 class="brand-headline">Modernize<br/>your supply<br/><span>chain.</span></h1>
        </div>

        <div class="brand-footer">
            <span>&copy; 2026 Invent India</span>
            <span>Privacy Policy</span>
            <span>Support</span>
        </div>
    </div>

    <div class="login-form-side">
        <div class="login-form-box">
            <h1>Welcome back</h1>
            <p class="login-form-sub">Enter your credentials to manage your workflow.</p>

            <div id="loginError" class="login-error">
                <i class="fas fa-exclamation-circle"></i>
                <span>Invalid email or password.</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Sign into Dashboard</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>
</div>
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  
  // If already logged in, redirect
  const existing = Session.get();
  if (existing) redirectByRole(existing.role);

  function fillCred(email) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = '12345';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    err.classList.remove('visible');

    try {
      const { data, error } = await db
        .from('users')
        .select('*')
        .eq('email', email)
        .eq('password', password)
        .single();

      if (error || !data) {
        err.classList.add('visible');
        btn.textContent = 'Sign In →';
        btn.disabled = false;
        return;
      }

      Session.set(data);
      redirectByRole(data.role);
    } catch (ex) {
      err.textContent = 'Connection error. Check your Supabase config.';
      err.classList.add('visible');
      btn.textContent = 'Sign In →';
      btn.disabled = false;
    }
  }

  function redirectByRole(role) {
    const routes = {
      master: 'pages/master.html',
      procurement_manager: 'pages/procurement.html',
      engineer: 'pages/engineer.html',
      project_manager: 'pages/pm.html',
      accounts: 'pages/accounts.html'      // ← ADDED
    };
    window.location.href = routes[role] || 'pages/engineer.html';
  }
</script>
</body>
</html>
